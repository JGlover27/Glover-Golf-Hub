// ── Helpers ───────────────────────────────────────────────────────
const avg = a => a.length ? (a.reduce((x,y)=>x+y,0)/a.length).toFixed(1) : "—";
const fmtD = s => {
  if (!s) return "—";
  const parts = String(s).split("-");
  // Only format if it's a genuine YYYY-MM-DD shape; otherwise show the raw
  // value as-is rather than producing "undefined/undefined/..." — this
  // makes any future date-parsing gap visible and debuggable instead of
  // silently displaying broken output.
  if (parts.length === 3 && /^\d{4}$/.test(parts[0]) && /^\d{1,2}$/.test(parts[1]) && /^\d{1,2}$/.test(parts[2])) {
    const [y,m,d] = parts;
    return `${d.padStart(2,"0")}/${m.padStart(2,"0")}/${y.slice(2)}`;
  }
  return String(s); // unrecognised format — show raw value, not garbage
};
const chipCls = d => d==null?"": d<=-2?"eagle": d===-1?"birdie": d===0?"par": d===1?"bogey":"double";
const chipLbl = d => d==null?"—": d===0?"E": d>0?`+${d}`:`${d}`;

// Sync writes directly onto ALL_COURSES (hole pars, sheetAvgToPar, yards,
// par-count breakdowns), which is otherwise a shared module-level object.
// A snapshot taken once at load time lets "Reset All Data" restore course
// metadata to its original state too — previously, reset only cleared the
// rounds list, while ALL_COURSES stayed permanently mutated from whatever
// was last synced, so the "fresh" baseline silently came back corrupted.
const PRISTINE_COURSES = JSON.parse(JSON.stringify(ALL_COURSES));
function restorePristineCourses() {
  ALL_COURSES.forEach((cd, ci) => {
    const pristine = PRISTINE_COURSES[ci];
    cd.par = pristine.par;
    cd.yards = pristine.yards;
    cd.par3s = pristine.par3s;
    cd.par4s = pristine.par4s;
    cd.par5s = pristine.par5s;
    cd.holes.forEach((h, hi) => {
      h.par = pristine.holes[hi].par;
      h.yards = pristine.holes[hi].yards;
      h.si = pristine.holes[hi].si;
      h.sheetAvgToPar = pristine.holes[hi].sheetAvgToPar;
    });
  });
}

function buildRounds() {
  // Hole-by-hole data comes ONLY from JSON sync, never from hardcoded data.
  // Previously the course objects contained round data read from screenshots
  // which was often inaccurate (e.g. misread scores). Now buildRounds just
  // sets up the baseline round list with summary-level data; hole data is
  // populated when the user syncs each course tab from their Google Sheet.
  return ROUNDS_RAW.map(r => {
    const cd = ALL_COURSES.find(c=>c.name===r.course);
    return {...r, par: cd?.par || 72, detailLoaded: false};
  });
}

function holeStats(cd, cRounds) {
  // Only count a round's hole-by-hole scores toward birdie/par/bogey totals
  // if that round has a FULL set of 18 hole scores. Previously, rounds with
  // partial/missing hole data (e.g. from an incomplete sync) were silently
  // included anyway via parseInt/isNaN filtering — which let the headline
  // "avg to par" (sourced straight from the sheet) and the birdie/bogey
  // counts (recalculated locally from possibly-incomplete hole arrays)
  // drift out of sync with each other, even though both looked plausible.
  const completeRounds = cRounds.filter(r =>
    r.holes && r.holes.filter(h => h !== "" && h != null && !isNaN(parseInt(h))).length === 18
  );
  const incompleteCount = cRounds.length - completeRounds.length;

  return cd.holes.map((hole,i)=>{
    const scores=completeRounds.map(r=>parseInt(r.holes[i])).filter(s=>!isNaN(s)&&s>0);
    const toPars=scores.map(s=>s-hole.par);
    const calcAtp=toPars.length?toPars.reduce((a,b)=>a+b,0)/toPars.length:null;
    // Prefer the avg to par recorded in your Google Sheet (more accurate than screenshot-read scores)
    const atp = hole.sheetAvgToPar != null ? hole.sheetAvgToPar : calcAtp;
    const avgScore = hole.sheetAvgToPar != null ? (hole.par + hole.sheetAvgToPar).toFixed(2)
                   : scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2):null;
    return {...hole,
      avgScore,
      avgToPar:atp!=null?atp.toFixed(2):null,
      best:scores.length?Math.min(...scores):null,
      worst:scores.length?Math.max(...scores):null,
      eagles:toPars.filter(d=>d<=-2).length,
      birdies:toPars.filter(d=>d===-1).length,
      pars:toPars.filter(d=>d===0).length,
      bogeys:toPars.filter(d=>d===1).length,
      doubles:toPars.filter(d=>d===2).length,
      triples:toPars.filter(d=>d===3).length,
      quads:toPars.filter(d=>d>=4).length,
      _roundsCounted: completeRounds.length,
      _roundsExcluded: incompleteCount,
    };
  });
}

function Chip({diff, score, small}) {
  const cls = chipCls(diff);
  const colors = {
    eagle:{bg:"#fef9c3",col:"#713f12"},
    birdie:{bg:"#dcfce7",col:"#14532d"},
    par:{bg:"#f1f5f9",col:"#475569"},
    bogey:{bg:"#fee2e2",col:"#7f1d1d"},
    double:{bg:"#7f1d1d",col:"#fff"},
  };
  const {bg="#f1f5f9",col=INM} = colors[cls]||{};
  return (
    <span style={{display:"inline-block",padding:small?"1px 5px":"2px 7px",borderRadius:12,fontWeight:600,
      fontFamily:"'IBM Plex Mono',monospace",fontSize:small?10:11,background:bg,color:col}}>
      {score!=null ? score : chipLbl(diff)}
    </span>
  );
}

// ── Line chart with trend line ────────────────────────────────────
function linReg(pts) {
  const n=pts.length; if(n<2) return null;
  const sx=pts.reduce((a,_,i)=>a+i,0), sy=pts.reduce((a,p)=>a+p.y,0);
  const sxy=pts.reduce((a,p,i)=>a+i*p.y,0), sx2=pts.reduce((a,_,i)=>a+i*i,0);
  const m=(n*sxy-sx*sy)/(n*sx2-sx*sx), b=(sy-m*sx)/n;
  return {m,b};
}

function LineChart({points, color=GL, dec=0, height=70, showTrend=true}) {
  if(!points.length) return null;
  const W=300,PL=30,PR=6,PT=6,PB=18,iW=W-PL-PR,iH=height-PT-PB;
  const ys=points.map(p=>p.y), mn=Math.min(...ys)-0.5, mx=Math.max(...ys)+0.5, range=mx-mn||1;
  const xp=i=>PL+i*(iW/(points.length-1||1));
  const yp=v=>Math.max(PT, Math.min(PT+iH, PT+iH-((v-mn)/range*iH)));
  const d=points.map((p,i)=>`${i===0?"M":"L"}${xp(i).toFixed(1)},${yp(p.y).toFixed(1)}`).join(" ");
  const area=d+` L${xp(points.length-1).toFixed(1)},${(PT+iH).toFixed(1)} L${PL},${(PT+iH).toFixed(1)} Z`;
  const reg = showTrend && points.length>=3 ? linReg(points) : null;
  const trendD = reg ? `M${xp(0).toFixed(1)},${yp(reg.b).toFixed(1)} L${xp(points.length-1).toFixed(1)},${yp(reg.m*(points.length-1)+reg.b).toFixed(1)}` : null;
  // trend colour: improving (lower score/hcp) = green, worsening = red
  const trendImproving = reg ? reg.m < 0 : true;
  const trendColor = trendImproving ? "#52B788" : "#E07070";
  const uid = color.replace("#","");
  return (
    <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height,display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
        </linearGradient>
      </defs>
      <line x1={PL} y1={PT} x2={PL} y2={PT+iH} stroke={CRD} strokeWidth="1"/>
      <line x1={PL} y1={PT+iH} x2={W-PR} y2={PT+iH} stroke={CRD} strokeWidth="1"/>
      {[mn+0.5,mx-0.5].map((v,i)=>(
        <text key={i} x={PL-3} y={yp(v)} textAnchor="end" dominantBaseline="middle" fontSize="8" fill={INL} fontFamily="IBM Plex Mono">{v.toFixed(dec)}</text>
      ))}
      {[0,Math.floor((points.length-1)/2),points.length-1].filter((v,i,a)=>a.indexOf(v)===i).map(i=>(
        <text key={i} x={xp(i)} y={height-3} textAnchor="middle" fontSize="8" fill={INL} fontFamily="IBM Plex Mono">{points[i].x}</text>
      ))}
      <path d={area} fill={`url(#g${uid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" strokeOpacity="0.7"/>
      {trendD && <path d={trendD} fill="none" stroke={trendColor} strokeWidth="2" strokeDasharray="4 2" strokeLinecap="round"/>}
      {points.map((p,i)=>(
        <circle key={i} cx={xp(i)} cy={yp(p.y)} r="2.5" fill={color} stroke="#fff" strokeWidth="1">
          <title>{p.x}: {p.y.toFixed(dec)}</title>
        </circle>
      ))}
      {trendD && (
        <text x={W-PR-2} y={yp(reg.m*(points.length-1)+reg.b)-5} textAnchor="end" fontSize="8" fill={trendColor} fontFamily="IBM Plex Mono" fontWeight="500">
          {trendImproving?"↓ improving":"↑ rising"}
        </text>
      )}
    </svg>
  );
}

  // Import raw JSON from Apps Script browser fetch
  async function importJSON() {
    if(!pasteIn.trim()) return;
    setPasteLoad(true); setPasteMsg("");
    try {
      const raw = pasteIn.trim();
      const start = raw.indexOf("{"), end = raw.lastIndexOf("}");
      if (start === -1) throw new Error("No JSON found — copy the full browser response");
      const parsed = JSON.parse(raw.slice(start, end + 1));

      // Handle wrapped response: {ok:true, sheet:"X", data:{...}}
      const payload = parsed.ok && parsed.data ? parsed.data : parsed;
      const sheetName = parsed.sheet || "";

      if (payload.type === "scores") {
        const imp = payload.rounds.filter(r=>r.course&&r.score).map((r,i)=>({
          id: Date.now()+i, date:r.date, course:r.course,
          totalScore:r.score, scoreToPar:r.scoreToPar,
          handicapCounting:r.handicapCounting, handicapAfter:r.handicapAfter,
          par:72, holes:Array(18).fill(""), front9:null, back9:null,
          detailLoaded:false, fromSheet:true,
        }));
        setRounds(p=>[...p.filter(r=>!r.fromSheet),...imp]);
        setPasteMsg(`✓ Imported ${imp.length} rounds from ${sheetName}`);

      } else if (payload.type === "course") {
        // Course-name matching is case/whitespace-insensitive: if the Apps
        // Script "sheet" name has different capitalisation or stray spaces
        // versus ALL_COURSES (e.g. "bulwell forest" vs "Bulwell Forest"),
        // a strict === match silently fails — the rounds still get created
        // but never line up with any course in the picker, so they vanish
        // from Course Stats even though the import reported success.
        const normalise = s => String(s||"").trim().toLowerCase().replace(/\s+/g," ");
        const cd = ALL_COURSES.find(c => normalise(c.name) === normalise(sheetName));
        const courseName = cd ? cd.name : sheetName; // always store using OUR canonical name

        // De-dupe holes by hole number and clamp to 1-18, in case the sheet
        // parser picked up an extra row (e.g. a stray "19")
        const seen = new Set();
        const cleanHoles = (payload.holes||[]).filter(h => {
          if (!h.n || h.n < 1 || h.n > 18 || seen.has(h.n)) return false;
          seen.add(h.n); return true;
        }).sort((a,b)=>a.n-b.n);

        // Update par AND avgToPar from sheet — previously only avgToPar was
        // pulled in, so a wrong hardcoded par (e.g. a hole listed as par 4
        // when it's actually par 5) never got corrected, which silently
        // skewed every birdie/bogey calculation for that hole.
        if (cd && cleanHoles.length) {
          cleanHoles.forEach((h) => {
            const idx = h.n - 1;
            if (cd.holes[idx]) {
              if (h.par) cd.holes[idx].par = h.par;
              if (h.avgToPar != null) cd.holes[idx].sheetAvgToPar = h.avgToPar;
            }
          });
        }

        // FULL REPLACE, not merge: previous versions tried to match each
        // sheet round to an existing round by date (falling back to score),
        // which was fragile — any date-format drift or earlier bad sync
        // could leave duplicate/stray rounds behind that never got cleaned
        // up, silently inflating birdie/bogey counts. Instead, every course
        // sync now wipes ALL existing rounds for that course and rebuilds
        // them fresh, purely from what the sheet says right now. The sheet
        // is the single source of truth — no merging, no matching, no
        // chance of stale duplicates surviving a sync.
        const freshRounds = (payload.rounds||[])
          .filter(rd => rd.holes && rd.holes.some(h => h != null))
          .map((rd, i) => {
            const holesArr = rd.holes.slice(0, 18).map(s => s != null ? String(s) : "");
            while (holesArr.length < 18) holesArr.push("");
            const total = rd.total || holesArr.reduce((s,h)=>s+(parseInt(h)||0),0);
            const coursePar = payload.totalPar || cd?.par || 72;
            return {
              id: `${courseName}-${rd.date}-${i}-${Date.now()}`,
              date: rd.date,
              course: courseName,
              totalScore: total,
              scoreToPar: total ? total - coursePar : null,
              handicapCounting: null,
              handicapAfter: null,
              par: coursePar,
              holes: holesArr,
              front9: rd.front9,
              back9: rd.back9,
              detailLoaded: true,
              fromSheet: true,
            };
          });

        setRounds(prev => [
          ...prev.filter(r => r.course !== courseName), // drop every old round for this course
          ...freshRounds,                                 // replace with exactly what the sheet says
        ]);

        const holeCountMsg = cleanHoles.length !== (payload.holes?.length||0)
          ? ` (cleaned from ${payload.holes.length} → ${cleanHoles.length})` : "";
        const noMatchMsg = !cd ? ` — ⚠️ "${sheetName}" doesn't match any known course, check the tab name` : "";
        setPasteMsg(`✓ Loaded ${cleanHoles.length} holes, ${freshRounds.length} rounds for ${courseName}${holeCountMsg}${noMatchMsg}`);
      } else if (payload.type === "courseInfo") {
        // Update par-3/4/5 counts and par/yards for each course from the Course Info tab
        let updated = 0;
        payload.courses.forEach(ci => {
          const cd = ALL_COURSES.find(c => c.name.toLowerCase() === ci.course.toLowerCase()
            || c.name.toLowerCase().replace(/e$/,"") === ci.course.toLowerCase().replace(/e$/,"")); // handles "Concord"/"Concorde" mismatch
          if (cd) {
            if (ci.par)   cd.par   = ci.par;
            if (ci.yards) cd.yards = ci.yards;
            cd.par3s = ci.par3s; cd.par4s = ci.par4s; cd.par5s = ci.par5s;
            updated++;
          }
        });
        setPasteMsg(`✓ Updated course info for ${updated} of ${payload.courses.length} courses`);
      } else {
        throw new Error("Unrecognised data format — make sure you copy the full JSON");
      }
      setPasteIn("");
    } catch(e) {
      setPasteMsg(`✗ ${e.message}`);
    }
    setPasteLoad(false);
  }

  // Sync via Google Apps Script
  function setSt(key,patch){setSyncSt(p=>({...p,[key]:{...(p[key]||{}),...patch}}));}

  async function syncViaScript(scriptUrl, sheetName) {
    // Direct fetch with mode cors — Apps Script deployed as "Anyone" 
    // does send CORS headers on the final redirected response
    const targetUrl = `${scriptUrl}?sheet=${encodeURIComponent(sheetName)}`;
    
    // Try direct fetch (works in Safari/Chrome where CORS is properly handled)
    const res = await fetch(targetUrl, {
      method: "GET",
      redirect: "follow",
    });
    
    if (!res.ok) throw new Error(`HTTP ${res.status} — check script is deployed as Anyone`);
    const text = await res.text();
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    if (start === -1) throw new Error("No JSON returned — open this URL in your browser to test: " + targetUrl);
    const parsed = JSON.parse(text.slice(start, end + 1));
    if (parsed.error) throw new Error(parsed.error);
    if (parsed.ok && parsed.data) return parsed.data;
    return parsed;
  }

  async function syncTab(key, scriptUrl) {
    if(!scriptUrl?.trim()) return;
    setSt(key,{loading:true,msg:""});
    try {
      // key "summary" → sheet name "Summary", others → match course name
      // Map key to exact sheet tab name
      const SHEET_NAME_MAP = {
        "summary": "Summary",
        "tinsley": "Tinsley",
        "aylesbury-vale": "Aylesbury Vale",
        "bulwell-forest": "Bulwell Forest",
        "bulwell-hall": "Bulwell Hall",
        "concord": "Concord",
        "three-locks": "Three Locks",
        "weston-turville": "Weston Turville",
        "whipsnade": "Whipsnade",
      };
      const sheetName = SHEET_NAME_MAP[key] || ALL_COURSES.find(c=>c.name.toLowerCase().replace(/\s+/g,"-")===key)?.name || key;

      const data = await syncViaScript(scriptUrl.trim(), sheetName);

      if (data.type === "scores") {
        // Summary tab — update round list
        const imp = data.rounds.filter(r=>r.course&&r.score).map((r,i)=>({
          id: Date.now()+i, date:r.date, course:r.course,
          totalScore:r.score, scoreToPar:r.scoreToPar,
          handicapCounting:r.handicapCounting, handicapAfter:r.handicapAfter,
          par:72, holes:Array(18).fill(""), front9:null, back9:null,
          detailLoaded:false, fromSheet:true,
        }));
        setRounds(p=>[...p.filter(r=>!r.fromSheet),...imp]);
        setSt(key,{loading:false,msg:`✓ ${imp.length} rounds synced`,
          lastSync:new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})});

      } else if (data.type === "course") {
        // Course tab — update hole-by-hole data and merge into rounds
        const courseName = sheetName;
        const cd = ALL_COURSES.find(c=>c.name===courseName);

        // Update hole avgToPar values from sheet
        if (cd && data.holes.length) {
          data.holes.forEach((h,i) => {
            if (cd.holes[i] && h.avgToPar != null) cd.holes[i].sheetAvgToPar = h.avgToPar;
          });
        }

        // Merge round hole data
        if (data.rounds.length) {
          setRounds(prev => prev.map(r => {
            if (r.course !== courseName) return r;
            const rd = data.rounds.find(d => d.date === r.date);
            if (!rd || !rd.holes) return r;
            return { ...r,
              holes: rd.holes.map(s => s != null ? String(s) : ""),
              par: data.totalPar || r.par,
              front9: rd.front9, back9: rd.back9,
              detailLoaded: true,
            };
          }));
        }
        setSt(key,{loading:false,msg:`✓ ${data.holes.length} holes, ${data.rounds.length} rounds synced`,
          lastSync:new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})});
      } else {
        setSt(key,{loading:false,msg:"✓ Data received (unrecognised format)"});
      }
    } catch(e) {
      setSt(key,{loading:false,msg:`✗ ${e.message}`});
    }
  }

                    <div style={{width:7,height:7,borderRadius:"50%",background:st.lastSync?GL:st.msg?.startsWith("✗")?RD:"#ccc"}}/>
                    <span style={{fontSize:12,fontWeight:600}}>{label}</span>
                    {st.loading&&<span style={{fontSize:11,color:INL}}>Syncing…</span>}
                    {st.msg&&!st.loading&&<span style={{fontSize:11,fontWeight:600,marginLeft:"auto",color:st.msg.startsWith("✓")?GM:RD}}>{st.msg}</span>}
                    {st.lastSync&&!st.loading&&<span style={{fontSize:10,color:INL}}>{st.lastSync}</span>}
                    {!st.loading&&<button style={{...S.btnG,fontSize:11,padding:"4px 10px",marginLeft:"auto",opacity:sheetUrls["master"]?1:0.4}}
                      disabled={!sheetUrls["master"]} onClick={()=>syncTab(key,sheetUrls["master"])}>⟳</button>}
                  </div>
                </div>
              );
            })}

            {/* JSON paste — most reliable method */}
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 12px"}}>
              <div style={{flex:1,height:1,background:CRD}}/><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:INL,letterSpacing:2}}>MANUAL JSON IMPORT</span><div style={{flex:1,height:1,background:CRD}}/>
            </div>
            <div style={{background:G,borderRadius:8,padding:"12px 14px",marginBottom:12,color:CR,fontSize:12,lineHeight:1.7}}>
              <strong style={{color:BRL}}>Guaranteed to work:</strong> Open your Apps Script URL in Safari with <code style={{background:"rgba(255,255,255,.15)",padding:"1px 5px",borderRadius:3}}>?sheet=Tinsley</code> appended, copy all the JSON text, paste below.
              <br/>Example: <code style={{background:"rgba(255,255,255,.15)",padding:"1px 5px",borderRadius:3,fontSize:10,wordBreak:"break-all"}}>{sheetUrls["master"]||"YOUR_SCRIPT_URL"}?sheet=Summary</code>
            </div>
            <div style={{...S.field,marginBottom:10}}>
              <label style={S.fLabel}>Paste raw JSON from browser (any sheet tab)</label>
              <textarea style={{...S.fInput,minHeight:100,resize:"vertical",fontFamily:"'IBM Plex Mono',monospace",fontSize:10}}
                value={pasteIn} onChange={e=>setPasteIn(e.target.value)} placeholder={'{"ok":true,"sheet":"Tinsley","data":{...}}'}/>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <button style={{...S.btnG,opacity:pasteLoad?0.5:1}} onClick={importJSON} disabled={pasteLoad}>{pasteLoad?"Importing…":"Import JSON"}</button>
              {pasteMsg&&<span style={{fontSize:12,fontWeight:600,color:pasteMsg.startsWith("✓")?GM:RD}}>{pasteMsg}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 12px"}}>
              <div style={{flex:1,height:1,background:CRD}}/><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:INL,letterSpacing:2}}>OR PASTE CSV DATA</span><div style={{flex:1,height:1,background:CRD}}/>
            </div>
            <div style={{...S.field,marginBottom:10}}>
              <label style={S.fLabel}>Paste sheet data (any tab)</label>
              <textarea style={{...S.fInput,minHeight:80,resize:"vertical",fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}
                value={pasteIn} onChange={e=>setPasteIn(e.target.value)} placeholder={"Round\tDate\tCourse\tScore\tScore to Par"}/>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <button style={{...S.btnG,opacity:pasteLoad?0.5:1}} onClick={importPaste} disabled={pasteLoad}>{pasteLoad?"Importing…":"Import CSV"}</button>
              {pasteMsg&&<span style={{fontSize:12,fontWeight:600,color:pasteMsg.startsWith("✓")?GM:RD}}>{pasteMsg}</span>}
            </div>
          </div>
        )}
      </>
      }
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
